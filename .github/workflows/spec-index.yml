name: spec-index

on:
  pull_request:

jobs:
  spec-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm spec:index
      # Committed indexes must match a fresh regeneration.
      - run: git diff --exit-code specs/indexes/
