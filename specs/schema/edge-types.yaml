# Edge type definitions for the specs graph.
# Every entry in /specs/graph/edges.yaml must have a `type` matching one of
# the keys below, and its source/target nodes must conform to the rules.
#
# Edge ID convention: edge-<slug>-<4 hex chars>
#   e.g. edge-cli-flag-parsing-9c2e

edge_types:
  proposes:
    source: contract
    target: intent

  selects:
    # decision → contract | patch. The human selection: a contract (proposal
    # market) or a patch (patch market). The target is a list of allowed node
    # types; edge_endpoint_types enforces membership.
    source: decision
    target: [contract, patch]

  decomposes:
    source: brief
    target: contract

  evidences:
    source: evidence
    target: brief

  supersedes:
    # same-type → same-type: source.type must equal target.type
    source: any
    target: same_as_source

  waives:
    # A human override waiving a node or a named check. `target: any` permits
    # either an ordinary node id OR a named check from specs/schema/checks.yaml
    # (references_resolve treats a known check name as resolved for `waives`).
    source: override
    target: any

  compares:
    # comparison → contract | patch. /review-contracts authors one `compares` edge
    # per live candidate contract; /compare-patches authors one per live candidate
    # patch. `comparison-required` checks contract coverage; `selected_patch_comparison`
    # checks patch coverage. The target is a list; edge_endpoint_types enforces it.
    source: comparison
    target: [contract, patch]

  touches:
    source: evidence
    target: capability

  flags:
    # drift-finding → evidence | capability. The target is a list of allowed
    # node types; edge_endpoint_types enforces membership.
    source: drift-finding
    target: [evidence, capability]

  integrates:
    # integration → evidence. /integrate authors one `integrates` edge per lane,
    # linking the contract's integration node to each lane's final evidence;
    # coverage-coherence checks they cover every live brief of the contract.
    source: integration
    target: evidence

  competes-for:
    # patch → brief. /propose-patches authors one per candidate patch, tying it to
    # the lane (or single) brief it competes for. A brief with >1 live competes-for
    # edge is a patch market the patch-comparison gate guards.
    source: patch
    target: brief

  synthesizes:
    # patch → patch. A synthesis patch points at each parent patch it combines;
    # `synthesis_parentage` requires >=2. Within-lane only — across-lane combination
    # is integration, never synthesis.
    source: patch
    target: patch
