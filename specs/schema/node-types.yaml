# Node type definitions for the specs graph.
# Every file in /specs/nodes/ must have frontmatter whose `type` matches one
# of the keys below, and must include every frontmatter key listed in
# required_fields. If `requires_body: true`, the markdown body after the
# frontmatter delimiter must also be non-empty. For types that declare
# status_values, the `status` field is constrained to that enum.
#
# Node ID convention: <type>-<slug>-<4 hex chars>
#   e.g. intent-spec-tooling-7f3a

node_types:
  intent:
    required_fields: [id, type, title, status, created]
    requires_body:   true
    status_values:   [open, addressed, rejected]

  contract:
    required_fields: [id, type, title, status, created]
    requires_body:   true
    status_values:   [candidate, approved, rejected, superseded]

  brief:
    required_fields: [id, type, title, status, created]
    requires_body:   true
    status_values:   [draft, approved, implemented]

  evidence:
    required_fields: [id, type, title, status, created]
    requires_body:   true
    status_values:   [draft, final]

  decision:
    # decision nodes have no status — the act of recording the decision
    # is itself the terminal state. They carry `decided_by` instead.
    required_fields: [id, type, title, decided_by, created]
    requires_body:   true

  override:
    # A human-signed waiver. Like `decision`, it has no status — the act of
    # recording it (with an approver and an expiry) is the terminal state.
    # `created` is allowed but not required; `expires` bounds its validity.
    required_fields: [id, type, title, reason, approved_by, expires]
    requires_body:   true

  capability:
    # Owns repo path globs via `paths`; the unit a drift diff maps to.
    # No retire lifecycle yet, so the only status is `active`.
    required_fields: [id, type, title, status, paths]
    requires_body:   true
    status_values:   [active]

  drift-finding:
    # A detected divergence between a diff's observable behaviour and the
    # linked contract/brief; created by /detect-drift, triaged by a human.
    required_fields: [id, type, title, status]
    requires_body:   true
    status_values:   [open, resolved, accepted]
