# Cross-cutting graph invariants, run by `pnpm spec:validate` in the order
# listed. Each rule's kind maps to a handler in tools/handlers/; rule
# parameters live here. Ordered so each rule can assume the preconditions
# established by the earlier ones.
rules:
  - id: nodes-required-fields
    kind: required_fields
    scope: nodes
  - id: edges-required-fields
    kind: required_fields
    scope: edges
  - id: nodes-type-declared
    kind: enum_constraint
    scope: nodes
    field: type
  - id: edges-type-declared
    kind: enum_constraint
    scope: edges
    field: type
  - id: nodes-id-unique
    kind: unique_field
    scope: nodes
    field: id
  - id: edges-id-unique
    kind: unique_field
    scope: edges
    field: id
  # Types without status_values (e.g. decision) are skipped by this
  # handler; they are still covered by required_fields — not unvalidated.
  - id: nodes-status-in-enum
    kind: enum_constraint
    scope: nodes
    field: status
  - id: edges-references-resolve
    kind: references_resolve
    scope: edges
    fields: [source, target]
  - id: edges-endpoint-types
    kind: edge_endpoint_types
  # A capability's `paths` must be a non-empty string list (required_fields
  # only proves presence): a scalar/typo'd `paths:` would silently own nothing.
  - id: capability-paths-shape
    kind: list_field
    scope: nodes
    type: capability
    field: paths
  - id: indexes-fresh
    kind: indexes_fresh

# Repo globs whose modification is "sensitive": a PR touching one of these must
# carry a linked approved contract (bound to the capability that owns the path)
# or an override, enforced by the diff-aware `spec:check-diff` (not a validate
# rule — read as data by the script). Start with one glob (SPEC §19).
sensitive_paths:
  - specs/schema/**
