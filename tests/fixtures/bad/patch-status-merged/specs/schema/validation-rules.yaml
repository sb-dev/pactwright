# Cross-cutting graph invariants, run in the order listed.
rules:
  - id: nodes-required-fields
    kind: required_fields
    scope: nodes
  - id: edges-required-fields
    kind: required_fields
    scope: edges
  - id: nodes-type-declared
    kind: enum_constraint
    scope: nodes
    field: type
  - id: edges-type-declared
    kind: enum_constraint
    scope: edges
    field: type
  - id: nodes-id-unique
    kind: unique_field
    scope: nodes
    field: id
  - id: edges-id-unique
    kind: unique_field
    scope: edges
    field: id
  - id: nodes-status-in-enum
    kind: enum_constraint
    scope: nodes
    field: status
  - id: nodes-class-in-range
    kind: class_range
    scope: nodes
    types: [intent, contract]
    values: [0, 1, 2, 3]
  - id: edges-references-resolve
    kind: references_resolve
    scope: edges
    fields: [source, target]
  - id: edges-endpoint-types
    kind: edge_endpoint_types
  - id: capability-paths-shape
    kind: list_field
    scope: nodes
    type: capability
    field: paths
  - id: class-market-quorum
    kind: class_market_quorum
  - id: comparison-required
    kind: comparison_required
  - id: integration-sections-list
    kind: list_field
    scope: nodes
    type: integration
    field: integration_sections
  - id: integration-sections-keys
    kind: closed_key_set
    scope: nodes
    type: integration
    field: integration_sections
    mode: set
    keys: [combined-outputs, combined-test-run, compliance-verdict, rollback-sequencing, combined-risk, follow-ups, scope-integrity]
  - id: brief-lane-valid
    kind: closed_key_set
    scope: nodes
    type: brief
    field: lane
    mode: member
    keys: [product-spec, domain-backend, frontend-ui, data-migration, api-integration, test-verification, observability-release, docs-spec]
  - id: coverage-coherence
    kind: coverage_coherence
  - id: synthesis-parentage
    kind: synthesis_parentage
  - id: selected-patch-comparison
    kind: selected_patch_comparison
  - id: indexes-fresh
    kind: indexes_fresh

sensitive_paths:
  - specs/schema/**

comparison_required_from: "2026-06-18"

coverage_coherence_from: "2026-06-18"
